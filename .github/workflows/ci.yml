name: CI

# Phase 0 — build + unit-test on every push to main and every PR. Complements the
# existing Xcode Cloud TestFlight pipeline with a fast, public build/test gate so a
# solo founder isn't hand-verifying every change.
#
# The app targets iOS 26 / Swift 6. If the GitHub runner image doesn't yet ship the
# iOS 26 SDK, the build/test steps SOFT-SKIP (the job stays green with a notice) rather
# than red-flagging every PR — and they auto-activate the moment a 26 image is available.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Unit Test (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Select newest Xcode + check for the iOS 26 SDK
        id: xc
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST"
          xcodebuild -version
          swift --version
          if xcodebuild -showsdks 2>/dev/null | grep -qiE 'iphonesimulator2[6-9]'; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=CI soft-skipped::This runner image lacks the iOS 26 SDK the app needs. Build/test skipped; will run automatically once GitHub ships an Xcode 26 image. (Verified locally + via Xcode Cloud in the meantime.)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Pick an available iPhone simulator
        id: sim
        if: steps.xc.outputs.skip == 'false'
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -E 'iPhone 1[0-9]|iPhone 2[0-9]' | tail -1 | sed -E 's/ \([0-9A-F-]+\).*//; s/^[[:space:]]*//')
          [ -z "$DEVICE" ] && DEVICE="iPhone 16 Pro"
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Build
        if: steps.xc.outputs.skip == 'false'
        run: |
          set -o pipefail
          xcodebuild -project ambidash.xcodeproj -scheme ambidash \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -derivedDataPath .ci-derived \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tail -40

      - name: Unit tests
        if: steps.xc.outputs.skip == 'false'
        run: |
          set -o pipefail
          xcodebuild -project ambidash.xcodeproj -scheme ambidash \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -derivedDataPath .ci-derived \
            CODE_SIGNING_ALLOWED=NO \
            -only-testing:ambidashTests \
            test 2>&1 | tail -60
