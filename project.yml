name: ambidash
options:
  bundleIdPrefix: com.ambidash
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  ambidash:
    type: application
    platform: iOS
    sources:
      - path: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_EMIT_LOC_STRINGS: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app
        INFOPLIST_KEY_NSHealthShareUsageDescription: "ambidash reads your health data (sleep, steps, workouts, heart rate) to power your self-awareness dashboard and personalize your daily plan."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "ambidash does not write health data."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "ambidash reads your calendar to find free time for your daily action plan and understand how you spend your time."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "ambidash reads your reminders to understand what tasks are on your mind."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: "AmbiDash"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ambidash
    entitlements:
      path: ambidash/ambidash.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.ambidash.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
  ambidashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ambidashTests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.tests

  ambidashUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ambidashUITests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.uitests

  ambidash-widget:
    type: app-extension
    platform: iOS
    sources:
      - path: ambidash-widget
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.widget
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  ambidash-monitor:
    type: app-extension
    platform: iOS
    sources:
      - path: ambidash-monitor
        excludes:
          - Info.plist
    info:
      path: ambidash-monitor/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.monitor
    dependencies:
      - sdk: DeviceActivity.framework
      - sdk: ManagedSettings.framework
