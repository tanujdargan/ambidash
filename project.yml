name: ambidash
options:
  bundleIdPrefix: com.ambidash
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  ambidash:
    type: application
    platform: iOS
    sources:
      - path: ambidash
        excludes:
          # The explicit base Info.plist (used only to inject NSAlarmKitUsageDescription)
          # must not be compiled as a source file.
          - Info.plist
      # Shared ActivityKit attributes type — physically lives in the widget
      # extension folder but is compiled into the app too so the app can
      # Activity.request(...) it. Kept plain-Codable / app-enum-free on purpose.
      - path: ambidash-widget/PlanBlockAttributes.swift
      # Shared AlarmKit Stop/Snooze App Intents — same discipline: compiled into the
      # app too so AlarmService can reference them when building an AlarmConfiguration.
      - path: ambidash-widget/BlockAlarmIntents.swift
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        # Explicit BASE Info.plist carrying NSAlarmKitUsageDescription (GENTLE TIMELINE
        # ALARMS). That key is NOT in Xcode's INFOPLIST_KEY_* auto-emit allowlist, so a
        # build-setting alone is silently dropped and AlarmKit then refuses to schedule.
        # GENERATE_INFOPLIST_FILE still merges every INFOPLIST_KEY_* below on top of it.
        INFOPLIST_FILE: ambidash/Info.plist
        # Live Activities (ActivityKit) — required on the HOST APP so the Now/Next
        # focus Live Activity can be requested. Injected into the generated
        # Info.plist via the INFOPLIST_KEY_ build-setting prefix.
        INFOPLIST_KEY_NSSupportsLiveActivities: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_EMIT_LOC_STRINGS: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app
        INFOPLIST_KEY_NSHealthShareUsageDescription: "ambidash reads your health data (sleep, steps, workouts, heart rate) to power your self-awareness dashboard and personalize your daily plan."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "ambidash does not write health data."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "ambidash reads your calendar to find free time for your daily action plan and understand how you spend your time."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "ambidash reads your reminders to understand what tasks are on your mind."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
        INFOPLIST_KEY_CFBundleDisplayName: "AmbiDash"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        # CFBundleURLTypes (the ambidash:// deep-link scheme) is declared in the
        # explicit base ambidash/Info.plist — once that file exists, this array-valued
        # build setting no longer merges, so it must not be duplicated here.
    entitlements:
      path: ambidash/ambidash.entitlements
      properties:
        com.apple.developer.applesignin:
          - "Default"
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.ambidash.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
        # Self-serve capability — lets gentle now-moment block-start nudges use
        # interruptionLevel .timeSensitive (pierces Focus, NEVER critical).
        com.apple.developer.usernotifications.time-sensitive: true
    dependencies:
      - target: ambidash-widget
        embed: true

  ambidash-mac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      # SHARED model layer, services, theme, utilities (with #if os(iOS) guards).
      # iOS-only views, the iOS app entry, Siri intents, and integration
      # services that import iOS-only frameworks are excluded here; the
      # mac-native UI lives in the ambidash-mac/ folder below.
      - path: ambidash
        excludes:
          - App/AmbidashApp.swift
          - App/RootView.swift
          - App/MainTabView.swift
          - App/NotificationDelegate.swift
          - Views
          - Intents
          - Services/HealthKitService.swift
          - Services/EventKitService.swift
          - Services/ScreenTimeService.swift
          - Services/NotificationService.swift
          - Services/AlarmService.swift
          - Services/IntegrationManager.swift
      - path: ambidash-mac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        INFOPLIST_KEY_CFBundleDisplayName: "AmbiDash"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 AmbiDash"
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ambidash
    entitlements:
      path: ambidash-mac/ambidash-mac.entitlements
      properties:
        com.apple.developer.applesignin:
          - "Default"
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.ambidash.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  ambidashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ambidashTests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.tests

  ambidashUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ambidashUITests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.uitests

  ambidash-widget:
    type: app-extension
    platform: iOS
    sources:
      - path: ambidash-widget
        excludes:
          - Info.plist
    info:
      path: ambidash-widget/Info.plist
      properties:
        CFBundleDisplayName: AmbiDash Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
    # App Group so the widget's UserDefaults(suiteName: "group.com.ambidash.app")
    # (WidgetSharedData) shares the app<->widget channel the Live Activity / tap-to-log
    # inbox features rely on. Without it the suite store is unusable on a real device
    # and the round-trip silently fails (simulator is more permissive and masks this).
    entitlements:
      path: ambidash-widget/ambidash-widget.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  # ambidash-monitor: disabled until Family Controls entitlement approved
  # Re-enable after Apple grants com.apple.developer.family-controls
