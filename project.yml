name: ambidash
options:
  bundleIdPrefix: com.ambidash
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  ambidash:
    type: application
    platform: iOS
    sources:
      - path: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        SWIFT_EMIT_LOC_STRINGS: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app
        INFOPLIST_KEY_NSHealthShareUsageDescription: "ambidash reads your health data (sleep, steps, workouts, heart rate) to power your self-awareness dashboard and personalize your daily plan."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "ambidash does not write health data."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "ambidash reads your calendar to find free time for your daily action plan and understand how you spend your time."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "ambidash reads your reminders to understand what tasks are on your mind."
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
        INFOPLIST_KEY_CFBundleDisplayName: "AmbiDash"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ambidash
    entitlements:
      path: ambidash/ambidash.entitlements
      properties:
        com.apple.developer.applesignin:
          - "Default"
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.ambidash.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
    dependencies:
      - target: ambidash-widget
        embed: true

  ambidash-mac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      # SHARED model layer, services, theme, utilities (with #if os(iOS) guards).
      # iOS-only views, the iOS app entry, Siri intents, and integration
      # services that import iOS-only frameworks are excluded here; the
      # mac-native UI lives in the ambidash-mac/ folder below.
      - path: ambidash
        excludes:
          - App/AmbidashApp.swift
          - App/RootView.swift
          - App/MainTabView.swift
          - Views
          - Intents
          - Services/HealthKitService.swift
          - Services/EventKitService.swift
          - Services/ScreenTimeService.swift
          - Services/NotificationService.swift
          - Services/IntegrationManager.swift
      - path: ambidash-mac
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.mac
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: true
        INFOPLIST_KEY_CFBundleDisplayName: "AmbiDash"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 AmbiDash"
        INFOPLIST_KEY_CFBundleURLTypes:
          - CFBundleURLSchemes:
              - ambidash
    entitlements:
      path: ambidash-mac/ambidash-mac.entitlements
      properties:
        com.apple.developer.applesignin:
          - "Default"
        com.apple.security.application-groups:
          - "group.com.ambidash.app"
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.ambidash.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true

  ambidashTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ambidashTests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.tests

  ambidashUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: ambidashUITests
    dependencies:
      - target: ambidash
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.uitests

  ambidash-widget:
    type: app-extension
    platform: iOS
    sources:
      - path: ambidash-widget
        excludes:
          - Info.plist
    info:
      path: ambidash-widget/Info.plist
      properties:
        CFBundleDisplayName: AmbiDash Widget
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ambidash.app.widget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "9"
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: SwiftUI.framework

  # ambidash-monitor: disabled until Family Controls entitlement approved
  # Re-enable after Apple grants com.apple.developer.family-controls
